<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>دعوتنامه</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ddd;
    cursor:pointer;
    overflow:hidden;
}


.envelope{

    width:650px;
    height:420px;

    position:relative;

    perspective:1000px;

}



/* پوستر */
.paper{

    position:absolute;

    width:420px;

    left:115px;

    top:35px;


    transform:scale(0.01);

    transform-origin:50% 0%;


    opacity:0;


    transition:1.8s cubic-bezier(.22,1,.36,1);


    z-index:20;

}


.paper img{

    width:100%;

    display:block;

}




/* بدنه پاکت */
.body{

    position:absolute;

    width:100%;

    height:100%;


    background:#050505;

    border-radius:18px;


    overflow:hidden;

    z-index:4;

}



/* نوشته پایین */
.bottom-title{

    position:absolute;

    bottom:85px;

    width:100%;


    text-align:center;


    color:#aaa;

    font-family:tahoma;


    font-size:34px;


    line-height:1.3;


    direction:rtl;


    z-index:5;

}



/* مثلث ها */
.left{

    position:absolute;

    bottom:0;

    left:0;


    border-top:210px solid transparent;

    border-right:325px solid #181818;

}



.right{

    position:absolute;

    bottom:0;

    right:0;


    border-top:210px solid transparent;

    border-left:325px solid #181818;

}




/* درب */
.flap{

    position:absolute;

    top:0;

    left:0;


    border-left:325px solid transparent;

    border-right:325px solid transparent;


    border-top:220px solid #111;


    transform-origin:top;


    transition:1s;


    z-index:8;

}



/* نوشته روی درب */
.title{

    position:absolute;


    top:-120px;


    left:-170px;


    width:340px;



    color:#aaa;


    font-family:tahoma;


    font-size:34px;



    text-align:center;


    direction:rtl;

}



/* باز شدن */
.open .flap{

    transform:rotateX(180deg);

}



/* پوستر */
.open .paper{


    opacity:1;


    left:calc(50% - 45vw);


    top:calc(50% - 45vh);



    width:90vw;


    height:90vh;



    transform:scale(1);



    transition-delay:.3s;

}



.open .paper img{


    width:100%;


    height:100%;


    object-fit:contain;

}


</style>

</head>


<body onclick="openEnvelope()">



<div class="envelope">



<div class="paper">

<img src="poster.jpg">

</div>



<div class="body">


<div class="bottom-title">

اولین سالگرد<br>
شهید مهدی نعمتی

</div>



<div class="left"></div>

<div class="right"></div>


</div>



<div class="flap">


<div class="title">

شما دعوتید به

</div>


</div>



</div>



<script>

function openEnvelope(){

document.querySelector(".envelope")
.classList.add("open");

}


setTimeout(openEnvelope,2000);


</script>


</body>
</html>
